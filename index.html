<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Decision Tree Builder</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

  :root{
    --canvas-bg:#1c1f26;
    --titlebar-bg:#20242c;
    --titlebar-text:#f4d68a;
    --panel-bg:#20242c;
    --panel-border:#333947;
    --node-bg:#2f3542;
    --node-border:#e8b84b;
    --node-text:#e7e9ee;
    --line-color:#5fb4a2;
    --accent:#e8b84b;
    --accent-soft:#3a3222;
    --muted:#8a8f9c;
    --danger:#d9705f;
    --node-radius:10;
    --font-ui:'Inter',sans-serif;
    --font-mono:'JetBrains Mono',monospace;
  }

  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    font-family:var(--font-ui);
    background:#111318;
    color:var(--node-text);
    display:flex;
    flex-direction:column;
    height:100vh;
    overflow:hidden;
  }

  /* ---------- Title bar ---------- */
  #titlebar{
    background:var(--titlebar-bg);
    border-bottom:1px solid var(--panel-border);
    display:flex;
    align-items:center;
    gap:14px;
    padding:10px 16px;
    flex:0 0 auto;
  }
  #titleInput{
    background:transparent;
    border:none;
    outline:none;
    color:var(--titlebar-text);
    font-family:var(--font-ui);
    font-weight:700;
    font-size:19px;
    letter-spacing:.2px;
    padding:6px 10px;
    border-radius:6px;
    flex:0 1 auto;
    min-width:120px;
    max-width:420px;
  }
  #titleInput:hover, #titleInput:focus{ background:rgba(255,255,255,.05); }

  .tb-sep{ width:1px; height:24px; background:var(--panel-border); }

  .tb-meta{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--muted);
    letter-spacing:.4px;
    text-transform:uppercase;
  }

  .spacer{flex:1;}

  .btn{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:#2a2f3a;
    border:1px solid var(--panel-border);
    color:var(--node-text);
    font-family:var(--font-ui);
    font-size:13px;
    font-weight:500;
    padding:8px 13px;
    border-radius:7px;
    cursor:pointer;
    transition:background .15s, border-color .15s, transform .05s;
    white-space:nowrap;
  }
  .btn:hover{ background:#333a47; border-color:#454d5e; }
  .btn:active{ transform:scale(.97); }
  .btn.primary{ background:var(--accent); border-color:var(--accent); color:#20242c; font-weight:700; }
  .btn.primary:hover{ filter:brightness(1.08); }
  .btn.ghost{ background:transparent; }
  .btn.small{ padding:5px 9px; font-size:12px; border-radius:6px; }
  .btn.danger{ color:var(--danger); border-color:#4a3530; }
  .btn.danger:hover{ background:#3a2622; }
  .btn:disabled{ opacity:.35; cursor:not-allowed; }

  /* ---------- Layout ---------- */
  #main{ flex:1; display:flex; min-height:0; }

  #canvasWrap{
    flex:1;
    background:var(--canvas-bg);
    overflow:auto;
    position:relative;
    background-image:radial-gradient(circle, #ffffff10 1px, transparent 1px);
    background-size:26px 26px;
  }
  #treeSvg{ display:block; }

  .row-band{ cursor:pointer; }
  .row-band rect{ transition:fill .15s; }
  .row-band:hover rect{ fill:#ffffff08; }

  .node-group{ cursor:pointer; }
  .node-fo div{
    width:100%; height:100%;
    display:flex; align-items:center; justify-content:center;
    text-align:center;
    font-family:var(--font-ui);
    font-size:13px;
    font-weight:600;
    color:var(--node-text);
    padding:4px 10px;
    line-height:1.25;
    overflow:hidden;
  }
  .node-idx{
    font-family:var(--font-mono);
    font-size:9px;
    fill:var(--muted);
    letter-spacing:.5px;
  }

  .layer-tag{
    font-family:var(--font-mono);
    font-size:10px;
    letter-spacing:1px;
    fill:var(--muted);
  }

  /* ---------- Editor panel ---------- */
  #editor{
    width:340px;
    flex:0 0 340px;
    background:var(--panel-bg);
    border-left:1px solid var(--panel-border);
    display:flex;
    flex-direction:column;
    min-height:0;
  }
  .editor-scroll{ overflow-y:auto; flex:1; padding:16px; }

  .layer-nav{
    display:flex;
    align-items:center;
    gap:8px;
    padding:14px 16px;
    border-bottom:1px solid var(--panel-border);
    flex:0 0 auto;
  }
  .layer-nav .navlabel{
    flex:1;
    text-align:center;
    font-family:var(--font-mono);
    font-size:12px;
    color:var(--accent);
    letter-spacing:.5px;
  }
  .layer-nav .navsub{
    display:block;
    color:var(--muted);
    font-size:10px;
    margin-top:2px;
  }

  .section-label{
    font-family:var(--font-mono);
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:1px;
    color:var(--muted);
    margin:18px 0 8px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .section-label:first-child{ margin-top:0; }

  .node-row{
    background:#262b35;
    border:1px solid var(--panel-border);
    border-radius:9px;
    padding:10px;
    margin-bottom:8px;
  }
  .node-row-top{
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:6px;
  }
  .node-row-top .tag{
    font-family:var(--font-mono);
    font-size:10px;
    color:var(--accent);
    background:var(--accent-soft);
    padding:2px 6px;
    border-radius:4px;
    flex:0 0 auto;
  }
  .node-row input[type=text]{
    flex:1;
    background:#1b1f27;
    border:1px solid var(--panel-border);
    color:var(--node-text);
    font-family:var(--font-ui);
    font-size:13px;
    padding:7px 9px;
    border-radius:6px;
    outline:none;
    min-width:0;
  }
  .node-row input[type=text]:focus{ border-color:var(--accent); }

  .conn-block{ margin-top:8px; }
  .conn-title{
    font-family:var(--font-mono);
    font-size:9.5px;
    color:var(--muted);
    letter-spacing:.4px;
    margin-bottom:5px;
    text-transform:uppercase;
  }
  .conn-list{ display:flex; flex-wrap:wrap; gap:5px; }
  .conn-chip{
    display:flex;
    align-items:center;
    gap:5px;
    background:#1b1f27;
    border:1px solid var(--panel-border);
    padding:4px 8px;
    border-radius:14px;
    font-size:11.5px;
    cursor:pointer;
    user-select:none;
    color:var(--muted);
    transition:all .12s;
  }
  .conn-chip.active{
    background:#20372f;
    border-color:var(--line-color);
    color:#bdeee0;
  }
  .conn-chip input{ display:none; }

  .add-node-btn{
    width:100%;
    justify-content:center;
    margin-top:2px;
    border-style:dashed;
  }

  .editor-footer{
    flex:0 0 auto;
    padding:12px 16px;
    border-top:1px solid var(--panel-border);
    display:flex;
    gap:8px;
  }
  .editor-footer .btn{ flex:1; justify-content:center; }

  /* ---------- Settings popover ---------- */
  #settingsPanel{
    position:fixed;
    top:58px;
    right:16px;
    width:280px;
    background:#20242c;
    border:1px solid var(--panel-border);
    border-radius:12px;
    box-shadow:0 12px 40px rgba(0,0,0,.5);
    padding:16px;
    z-index:50;
    display:none;
  }
  #settingsPanel.open{ display:block; }
  #settingsPanel h4{
    margin:0 0 12px;
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:1px;
    color:var(--muted);
    font-family:var(--font-mono);
  }
  .setting-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:10px;
    gap:10px;
  }
  .setting-row label{ font-size:12.5px; color:var(--node-text); }
  .setting-row input[type=color]{
    width:34px; height:26px; border:none; border-radius:6px; background:none; cursor:pointer; padding:0;
  }
  .setting-row input[type=range]{ width:110px; }
  #settingsPanel .btn{ width:100%; justify-content:center; margin-top:6px; }

  ::-webkit-scrollbar{ width:10px; height:10px; }
  ::-webkit-scrollbar-track{ background:transparent; }
  ::-webkit-scrollbar-thumb{ background:#3a4152; border-radius:6px; }

  /* ---------- Trees panel ---------- */
  #treesPanel{
    position:fixed;
    top:58px;
    right:16px;
    width:300px;
    max-height:70vh;
    background:#20242c;
    border:1px solid var(--panel-border);
    border-radius:12px;
    box-shadow:0 12px 40px rgba(0,0,0,.5);
    z-index:50;
    display:none;
    flex-direction:column;
  }
  #treesPanel.open{ display:flex; }
  .side-overlay-header{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 16px 10px;
  }
  .side-overlay-header h4{
    margin:0; font-size:12px; text-transform:uppercase; letter-spacing:1px;
    color:var(--muted); font-family:var(--font-mono);
  }
  #newTreeBtn{ margin:0 16px 10px; width:calc(100% - 32px); }
  #treesList{ overflow-y:auto; padding:0 16px 16px; flex:1; }
  .tree-item{
    background:#262b35; border:1px solid var(--panel-border); border-radius:9px;
    padding:9px 10px; margin-bottom:8px;
  }
  .tree-item.active{ border-color:var(--accent); }
  .tree-item-top{ display:flex; align-items:center; gap:6px; }
  .tree-item-title{
    flex:1; font-size:13px; font-weight:600; cursor:pointer; overflow:hidden;
    text-overflow:ellipsis; white-space:nowrap;
  }
  .tree-item-meta{
    font-family:var(--font-mono); font-size:9.5px; color:var(--muted); margin-top:4px;
  }
  .tree-empty{ color:var(--muted); font-size:12.5px; padding:8px 0; }

  /* ---------- Play mode overlay ---------- */
  #playOverlay{
    position:fixed; inset:0; background:rgba(10,11,15,.92);
    z-index:100; display:none; flex-direction:column; align-items:center;
  }
  #playOverlay.open{ display:flex; }
  .play-topbar{
    width:100%; display:flex; align-items:center; gap:10px;
    padding:14px 20px; box-sizing:border-box;
  }
  .play-topbar .spacer{ flex:1; }
  #playBreadcrumb{
    font-family:var(--font-mono); font-size:11.5px; color:var(--muted);
    max-width:60%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  #playBody{
    flex:1; width:100%; max-width:640px; display:flex; flex-direction:column;
    align-items:center; justify-content:center; padding:20px; box-sizing:border-box;
    text-align:center; gap:22px;
  }
  .play-question{
    font-size:26px; font-weight:700; color:var(--node-text); line-height:1.3;
  }
  .play-choices{
    display:flex; flex-direction:column; gap:10px; width:100%; max-width:420px;
  }
  .play-choice{
    padding:14px 18px !important; font-size:15px !important; justify-content:center;
  }
  .play-end{
    font-family:var(--font-mono); font-size:13px; color:var(--line-color);
    text-transform:uppercase; letter-spacing:.5px;
  }
</style>
</head>
<body>

<header id="titlebar">
  <input id="titleInput" type="text" value="Untitled Decision Tree" spellcheck="false">
  <div class="tb-sep"></div>
  <span class="tb-meta" id="treeMeta">3 rows</span>
  <span class="tb-meta" id="saveStatus">Saved</span>
  <div class="spacer"></div>
  <button class="btn ghost small" id="addLayerBtn">+ Add row</button>
  <button class="btn ghost small danger" id="delLayerBtn">− Remove last row</button>
  <div class="tb-sep"></div>
  <button class="btn" id="treesBtn">📁 Trees</button>
  <button class="btn" id="playBtn">▶ Play</button>
  <div class="tb-sep"></div>
  <button class="btn" id="settingsBtn">🎨 Style</button>
  <button class="btn small" id="jsonExportBtn">JSON ⬇</button>
  <button class="btn small" id="jsonImportBtn">JSON ⬆</button>
  <input type="file" id="jsonFileInput" accept="application/json" style="display:none">
  <button class="btn primary" id="exportBtn">⬇ Export</button>
</header>

<div id="main">
  <div id="canvasWrap">
    <svg id="treeSvg" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

  <aside id="editor">
    <div class="layer-nav">
      <button class="btn small" id="prevLayer">↑ Up</button>
      <div class="navlabel" id="layerLabel">Row 1 of 3
        <span class="navsub" id="layerSub">1 node</span>
      </div>
      <button class="btn small" id="nextLayer">Down ↓</button>
    </div>
    <div class="editor-scroll">
      <div class="section-label">Edit this row</div>
      <div id="nodeList"></div>
      <button class="btn add-node-btn" id="addNodeBtn">+ Add node to this row</button>
    </div>
  </aside>
</div>

<div id="settingsPanel">
  <h4>Title bar</h4>
  <div class="setting-row"><label>Bar background</label><input type="color" id="c-titlebar-bg"></div>
  <div class="setting-row"><label>Title text</label><input type="color" id="c-titlebar-text"></div>
  <h4 style="margin-top:16px;">Canvas</h4>
  <div class="setting-row"><label>Background</label><input type="color" id="c-canvas-bg"></div>
  <div class="setting-row"><label>Connection lines</label><input type="color" id="c-line-color"></div>
  <h4 style="margin-top:16px;">Node style</h4>
  <div class="setting-row"><label>Fill</label><input type="color" id="c-node-bg"></div>
  <div class="setting-row"><label>Border / accent</label><input type="color" id="c-node-border"></div>
  <div class="setting-row"><label>Text</label><input type="color" id="c-node-text"></div>
  <div class="setting-row"><label>Corner radius</label><input type="range" id="c-node-radius" min="0" max="30" step="1"></div>
  <button class="btn" id="closeSettings">Done</button>
</div>

<div id="treesPanel">
  <div class="side-overlay-header">
    <h4>Saved trees</h4>
    <button class="btn small ghost" id="closeTreesPanel">✕</button>
  </div>
  <button class="btn add-node-btn" id="newTreeBtn">+ New tree</button>
  <div id="treesList"></div>
</div>

<div id="playOverlay">
  <div class="play-topbar">
    <button class="btn small" id="playBackBtn">← Back</button>
    <div class="spacer"></div>
    <div id="playBreadcrumb"></div>
    <div class="spacer"></div>
    <button class="btn small danger" id="playCloseBtn">✕ Exit play mode</button>
  </div>
  <div id="playBody"></div>
</div>

<script>
(function(){
  "use strict";

  /* ============ STATE ============ */
  let idCounter = 0;
  const newId = () => 'n' + (idCounter++);

  const state = {
    title: "Untitled Decision Tree",
    colors: {
      titlebarBg: '#20242c',
      titlebarText: '#f4d68a',
      canvasBg: '#1c1f26',
      lineColor: '#5fb4a2',
      nodeBg: '#2f3542',
      nodeBorder: '#e8b84b',
      nodeText: '#e7e9ee',
      nodeRadius: 10
    },
    layers: []
  };

  function seedTree(){
    const a = newId(), b = newId(), c = newId(), d = newId(), e = newId();
    state.layers = [
      [ {id:a, label:'Start: new feature request', children:[b,c]} ],
      [ {id:b, label:'Is it a quick fix?', children:[d]},
        {id:c, label:'Needs design review?', children:[e]} ],
      [ {id:d, label:'Ship it this sprint', children:[]},
        {id:e, label:'Add to roadmap', children:[]} ]
    ];
  }

  let activeLayer = 0;

  /* ============ PERSISTENCE (localStorage) ============ */
  const STORAGE_TREES_KEY = 'aline.trees.v1';
  const STORAGE_ACTIVE_KEY = 'aline.activeTreeId.v1';
  let activeTreeId = null;
  let saveTimer = null;

  function loadTreesMap(){
    try{ return JSON.parse(localStorage.getItem(STORAGE_TREES_KEY)) || {}; }
    catch(e){ return {}; }
  }
  function saveTreesMap(map){
    try{ localStorage.setItem(STORAGE_TREES_KEY, JSON.stringify(map)); }
    catch(e){ /* storage unavailable/full — editing still works, just won't persist */ }
  }
  function newTreeId(){
    return 't' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }
  function computeMaxIdCounter(layers){
    let max = 0;
    layers.forEach(layer => layer.forEach(n=>{
      const m = /^n(\d+)$/.exec(n.id);
      if(m) max = Math.max(max, parseInt(m[1], 10) + 1);
    }));
    return max;
  }

  function scheduleAutosave(){
    const status = document.getElementById('saveStatus');
    if(status) status.textContent = 'Saving…';
    clearTimeout(saveTimer);
    saveTimer = setTimeout(persistActiveTree, 400);
  }

  function persistActiveTree(){
    if(!activeTreeId) return;
    const map = loadTreesMap();
    map[activeTreeId] = {
      id: activeTreeId,
      title: state.title,
      updatedAt: Date.now(),
      data: { title: state.title, colors: state.colors, layers: state.layers, idCounter }
    };
    saveTreesMap(map);
    localStorage.setItem(STORAGE_ACTIVE_KEY, activeTreeId);
    const status = document.getElementById('saveStatus');
    if(status) status.textContent = 'Saved';
  }

  function createNewTree(seed){
    activeTreeId = newTreeId();
    idCounter = 0;
    if(seed){
      state.title = 'Untitled Decision Tree';
      seedTree();
    } else {
      state.title = 'Untitled Decision Tree';
      state.layers = [[{id:newId(), label:'Start here', children:[]}]];
    }
    activeLayer = 0;
    titleInput.value = state.title;
    applyColors();
    initSettingsInputs();
    renderAll();
    persistActiveTree();
    renderTreesList();
  }

  function loadTree(id){
    const map = loadTreesMap();
    const rec = map[id];
    if(!rec) return;
    activeTreeId = id;
    state.title = rec.data.title;
    state.colors = Object.assign({}, state.colors, rec.data.colors);
    state.layers = rec.data.layers;
    idCounter = rec.data.idCounter != null ? rec.data.idCounter : computeMaxIdCounter(rec.data.layers);
    activeLayer = 0;
    titleInput.value = state.title;
    applyColors();
    initSettingsInputs();
    renderAll();
    localStorage.setItem(STORAGE_ACTIVE_KEY, activeTreeId);
    renderTreesList();
  }

  function deleteTree(id){
    const map = loadTreesMap();
    delete map[id];
    saveTreesMap(map);
    if(id === activeTreeId){
      const remaining = Object.keys(map);
      if(remaining.length) loadTree(remaining[0]);
      else createNewTree(true);
    } else {
      renderTreesList();
    }
  }

  function renameTree(id){
    const map = loadTreesMap();
    const rec = map[id];
    if(!rec) return;
    const name = prompt('Rename tree', rec.title);
    if(name === null) return;
    rec.title = name.trim() || rec.title;
    rec.updatedAt = Date.now();
    if(id === activeTreeId){
      state.title = rec.title;
      rec.data.title = rec.title;
      titleInput.value = state.title;
      renderSvg();
    }
    map[id] = rec;
    saveTreesMap(map);
    renderTreesList();
  }

  function relativeTime(ts){
    const s = Math.max(1, Math.round((Date.now() - ts) / 1000));
    if(s < 60) return `${s}s ago`;
    const m = Math.round(s / 60);
    if(m < 60) return `${m}m ago`;
    const h = Math.round(m / 60);
    if(h < 24) return `${h}h ago`;
    return `${Math.round(h / 24)}d ago`;
  }

  function renderTreesList(){
    const list = document.getElementById('treesList');
    if(!list) return;
    const map = loadTreesMap();
    const entries = Object.values(map).sort((a, b) => b.updatedAt - a.updatedAt);
    list.innerHTML = '';
    if(!entries.length){
      list.innerHTML = '<div class="tree-empty">No saved trees yet.</div>';
      return;
    }
    entries.forEach(rec=>{
      const item = document.createElement('div');
      item.className = 'tree-item' + (rec.id === activeTreeId ? ' active' : '');

      const top = document.createElement('div');
      top.className = 'tree-item-top';

      const title = document.createElement('div');
      title.className = 'tree-item-title';
      title.textContent = rec.title || 'Untitled';
      title.title = 'Click to open';
      title.addEventListener('click', ()=> loadTree(rec.id));

      const renameBtn = document.createElement('button');
      renameBtn.className = 'btn small ghost';
      renameBtn.textContent = '✎';
      renameBtn.title = 'Rename';
      renameBtn.addEventListener('click', ()=> renameTree(rec.id));

      const delBtn = document.createElement('button');
      delBtn.className = 'btn small danger';
      delBtn.textContent = '✕';
      delBtn.title = 'Delete';
      delBtn.addEventListener('click', ()=>{
        if(confirm(`Delete "${rec.title || 'Untitled'}"? This cannot be undone.`)) deleteTree(rec.id);
      });

      top.appendChild(title);
      top.appendChild(renameBtn);
      top.appendChild(delBtn);

      const meta = document.createElement('div');
      meta.className = 'tree-item-meta';
      const rows = (rec.data.layers || []).length;
      meta.textContent = `${rows} row${rows !== 1 ? 's' : ''} · updated ${relativeTime(rec.updatedAt)}`;

      item.appendChild(top);
      item.appendChild(meta);
      list.appendChild(item);
    });
  }

  document.getElementById('treesBtn').addEventListener('click', ()=>{
    renderTreesList();
    document.getElementById('treesPanel').classList.toggle('open');
  });
  document.getElementById('closeTreesPanel').addEventListener('click', ()=>{
    document.getElementById('treesPanel').classList.remove('open');
  });
  document.getElementById('newTreeBtn').addEventListener('click', ()=>{
    if(confirm('Start a new, empty tree? Your current tree stays saved and reachable from this list.')){
      createNewTree(false);
    }
  });

  /* ============ COLOR / STYLE SYNC ============ */
  const root = document.documentElement.style;
  function applyColors(){
    root.setProperty('--titlebar-bg', state.colors.titlebarBg);
    root.setProperty('--titlebar-text', state.colors.titlebarText);
    root.setProperty('--canvas-bg', state.colors.canvasBg);
    root.setProperty('--line-color', state.colors.lineColor);
    root.setProperty('--node-bg', state.colors.nodeBg);
    root.setProperty('--node-border', state.colors.nodeBorder);
    root.setProperty('--node-text', state.colors.nodeText);
    root.setProperty('--accent', state.colors.nodeBorder);
  }

  function initSettingsInputs(){
    document.getElementById('c-titlebar-bg').value = state.colors.titlebarBg;
    document.getElementById('c-titlebar-text').value = state.colors.titlebarText;
    document.getElementById('c-canvas-bg').value = state.colors.canvasBg;
    document.getElementById('c-line-color').value = state.colors.lineColor;
    document.getElementById('c-node-bg').value = state.colors.nodeBg;
    document.getElementById('c-node-border').value = state.colors.nodeBorder;
    document.getElementById('c-node-text').value = state.colors.nodeText;
    document.getElementById('c-node-radius').value = state.colors.nodeRadius;
  }

  const settingsMap = {
    'c-titlebar-bg':'titlebarBg', 'c-titlebar-text':'titlebarText',
    'c-canvas-bg':'canvasBg', 'c-line-color':'lineColor',
    'c-node-bg':'nodeBg', 'c-node-border':'nodeBorder', 'c-node-text':'nodeText'
  };
  Object.keys(settingsMap).forEach(inputId=>{
    document.getElementById(inputId).addEventListener('input', e=>{
      state.colors[settingsMap[inputId]] = e.target.value;
      applyColors();
      renderSvg();
      scheduleAutosave();
    });
  });
  document.getElementById('c-node-radius').addEventListener('input', e=>{
    state.colors.nodeRadius = +e.target.value;
    renderSvg();
    scheduleAutosave();
  });

  document.getElementById('settingsBtn').addEventListener('click', ()=>{
    document.getElementById('settingsPanel').classList.toggle('open');
  });
  document.getElementById('closeSettings').addEventListener('click', ()=>{
    document.getElementById('settingsPanel').classList.remove('open');
  });

  /* ============ TITLE ============ */
  const titleInput = document.getElementById('titleInput');
  titleInput.value = state.title;
  titleInput.addEventListener('input', e=>{
    state.title = e.target.value || 'Untitled Decision Tree';
    scheduleAutosave();
  });

  /* ============ LAYER STRUCTURE OPS ============ */
  document.getElementById('addLayerBtn').addEventListener('click', ()=>{
    state.layers.push([{id:newId(), label:'New node', children:[]}]);
    activeLayer = state.layers.length - 1;
    renderAll();
  });
  document.getElementById('delLayerBtn').addEventListener('click', ()=>{
    if(state.layers.length <= 1) return;
    if(!confirm('Remove the last row of the tree? This cannot be undone.')) return;
    const removedLayer = state.layers.pop();
    const removedIds = new Set(removedLayer.map(n=>n.id));
    if(state.layers.length){
      state.layers[state.layers.length-1].forEach(n=>{
        n.children = n.children.filter(c=>!removedIds.has(c));
      });
    }
    if(activeLayer >= state.layers.length) activeLayer = state.layers.length - 1;
    renderAll();
  });

  /* ============ ROW (NODE) OPS ============ */
  function addNode(layerIndex){
    state.layers[layerIndex].push({id:newId(), label:'New node', children:[]});
    renderAll();
  }
  function deleteNode(layerIndex, nodeId){
    const layer = state.layers[layerIndex];
    if(layer.length <= 1) return;
    state.layers[layerIndex] = layer.filter(n=>n.id !== nodeId);
    if(layerIndex > 0){
      state.layers[layerIndex-1].forEach(n=>{
        n.children = n.children.filter(c=>c!==nodeId);
      });
    }
    renderAll();
  }
  function updateLabel(layerIndex, nodeId, text){
    const node = state.layers[layerIndex].find(n=>n.id===nodeId);
    if(node) node.label = text;
    renderSvg();
    scheduleAutosave();
  }
  function toggleConnection(layerIndex, nodeId, childId, checked){
    const node = state.layers[layerIndex].find(n=>n.id===nodeId);
    if(!node) return;
    if(checked){
      if(!node.children.includes(childId)) node.children.push(childId);
    } else {
      node.children = node.children.filter(c=>c!==childId);
    }
    renderSvg();
    scheduleAutosave();
  }

  /* ============ NAVIGATION ============ */
  document.getElementById('prevLayer').addEventListener('click', ()=>{
    if(activeLayer > 0){ activeLayer--; renderAll(); }
  });
  document.getElementById('nextLayer').addEventListener('click', ()=>{
    if(activeLayer < state.layers.length - 1){ activeLayer++; renderAll(); }
  });
  document.getElementById('addNodeBtn').addEventListener('click', ()=> addNode(activeLayer));

  /* ============ RENDER: EDITOR PANEL ============ */
  function renderEditor(){
    const layers = state.layers;
    const layer = layers[activeLayer];

    document.getElementById('layerLabel').innerHTML =
      `Row ${activeLayer+1} of ${layers.length}<span class="navsub">${layer.length} node${layer.length!==1?'s':''}</span>`;
    document.getElementById('prevLayer').disabled = activeLayer === 0;
    document.getElementById('nextLayer').disabled = activeLayer === layers.length - 1;
    document.getElementById('treeMeta').textContent = `${layers.length} row${layers.length!==1?'s':''}`;
    document.getElementById('delLayerBtn').disabled = layers.length <= 1;

    const list = document.getElementById('nodeList');
    list.innerHTML = '';
    const hasNextLayer = activeLayer < layers.length - 1;
    const nextLayerNodes = hasNextLayer ? layers[activeLayer+1] : [];

    layer.forEach((node, idx)=>{
      const row = document.createElement('div');
      row.className = 'node-row';

      const top = document.createElement('div');
      top.className = 'node-row-top';

      const tag = document.createElement('span');
      tag.className = 'tag';
      tag.textContent = String(idx+1).padStart(2,'0');

      const input = document.createElement('input');
      input.type = 'text';
      input.value = node.label;
      input.placeholder = 'Node label';
      input.addEventListener('input', e=> updateLabel(activeLayer, node.id, e.target.value));

      const delBtn = document.createElement('button');
      delBtn.className = 'btn small danger';
      delBtn.textContent = '✕';
      delBtn.title = 'Delete node';
      delBtn.disabled = layer.length <= 1;
      delBtn.addEventListener('click', ()=> deleteNode(activeLayer, node.id));

      top.appendChild(tag);
      top.appendChild(input);
      top.appendChild(delBtn);
      row.appendChild(top);

      if(hasNextLayer){
        const connBlock = document.createElement('div');
        connBlock.className = 'conn-block';
        const connTitle = document.createElement('div');
        connTitle.className = 'conn-title';
        connTitle.textContent = 'Connects to (next row)';
        connBlock.appendChild(connTitle);

        const connList = document.createElement('div');
        connList.className = 'conn-list';

        nextLayerNodes.forEach((child, cIdx)=>{
          const chip = document.createElement('label');
          chip.className = 'conn-chip' + (node.children.includes(child.id) ? ' active' : '');
          const cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.checked = node.children.includes(child.id);
          cb.addEventListener('change', e=>{
            toggleConnection(activeLayer, node.id, child.id, e.target.checked);
            chip.classList.toggle('active', e.target.checked);
          });
          const lbl = document.createElement('span');
          lbl.textContent = `${cIdx+1}. ${(child.label||'Untitled').slice(0,18)}`;
          chip.appendChild(cb);
          chip.appendChild(lbl);
          connList.appendChild(chip);
        });

        connBlock.appendChild(connList);
        row.appendChild(connBlock);
      }

      list.appendChild(row);
    });
  }

  /* ============ RENDER: SVG TREE ============ */
  const NODE_W = 176, NODE_H = 64, ROW_H = 160, TOP_PAD = 50, BOTTOM_PAD = 50;
  const SIDE_PAD = 60;

  function layoutPositions(){
    const layers = state.layers;
    const maxCount = Math.max(...layers.map(l=>l.length), 1);
    const rowWidth = Math.max(maxCount * 210, 620);
    const svgWidth = rowWidth + SIDE_PAD*2;
    const svgHeight = TOP_PAD + layers.length*ROW_H + BOTTOM_PAD;

    const posById = {};
    layers.forEach((layer, li)=>{
      const spacing = rowWidth / layer.length;
      layer.forEach((node, ni)=>{
        const cx = SIDE_PAD + spacing*(ni+0.5);
        const cy = TOP_PAD + li*ROW_H + NODE_H/2;
        posById[node.id] = {cx, cy, li, ni};
      });
    });
    return {svgWidth, svgHeight, rowWidth, posById};
  }

  function esc(str){
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function buildSvgMarkup(){
    const {svgWidth, svgHeight, rowWidth, posById} = layoutPositions();
    const layers = state.layers;
    const r = state.colors.nodeRadius;

    let defs = `
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z" fill="var(--line-color)"></path>
        </marker>
      </defs>`;

    let bands = '';
    layers.forEach((layer, li)=>{
      const y = TOP_PAD + li*ROW_H - 14;
      const isActive = li === activeLayer;
      bands += `
        <g class="row-band" data-layer="${li}">
          <rect x="0" y="${y}" width="${svgWidth}" height="${ROW_H - 24}"
            fill="${isActive ? 'var(--accent)' : 'transparent'}"
            fill-opacity="${isActive ? 0.06 : 0}"></rect>
          <text class="layer-tag" x="${SIDE_PAD - 40}" y="${y + (ROW_H-24)/2}" dominant-baseline="middle">R${li+1}</text>
        </g>`;
    });

    let edges = '';
    layers.forEach((layer)=>{
      layer.forEach(node=>{
        const from = posById[node.id];
        node.children.forEach(childId=>{
          const to = posById[childId];
          if(!from || !to) return;
          const x1 = from.cx, y1 = from.cy + NODE_H/2;
          const x2 = to.cx, y2 = to.cy - NODE_H/2;
          const midY = (y1+y2)/2;
          edges += `<path d="M ${x1},${y1} C ${x1},${midY} ${x2},${midY} ${x2},${y2}"
            fill="none" stroke="var(--line-color)" stroke-width="2" marker-end="url(#arrow)" opacity="0.85"></path>`;
        });
      });
    });

    let nodes = '';
    layers.forEach((layer, li)=>{
      const isActive = li === activeLayer;
      layer.forEach((node, ni)=>{
        const pos = posById[node.id];
        const x = pos.cx - NODE_W/2, y = pos.cy - NODE_H/2;
        nodes += `
          <g class="node-group" data-layer="${li}" data-node="${node.id}">
            <rect x="${x}" y="${y}" width="${NODE_W}" height="${NODE_H}" rx="${r}" ry="${r}"
              fill="var(--node-bg)" stroke="var(--node-border)"
              stroke-width="${isActive ? 3 : 1.5}"
              stroke-dasharray="${isActive ? '0' : '0'}"
              opacity="${isActive ? 1 : 0.82}"></rect>
            <text class="node-idx" x="${x+10}" y="${y+14}">${String(ni+1).padStart(2,'0')}</text>
            <foreignObject class="node-fo" x="${x}" y="${y+6}" width="${NODE_W}" height="${NODE_H-8}">
              <div xmlns="http://www.w3.org/1999/xhtml">${esc(node.label||'Untitled')}</div>
            </foreignObject>
          </g>`;
      });
    });

    return {svgWidth, svgHeight, markup: defs + bands + edges + nodes};
  }

  function renderSvg(){
    const svg = document.getElementById('treeSvg');
    const {svgWidth, svgHeight, markup} = buildSvgMarkup();
    svg.setAttribute('width', svgWidth);
    svg.setAttribute('height', svgHeight);
    svg.setAttribute('viewBox', `0 0 ${svgWidth} ${svgHeight}`);
    svg.innerHTML = markup;

    svg.querySelectorAll('.row-band').forEach(el=>{
      el.addEventListener('click', ()=>{
        activeLayer = +el.getAttribute('data-layer');
        renderAll();
      });
    });
    svg.querySelectorAll('.node-group').forEach(el=>{
      el.addEventListener('click', (e)=>{
        e.stopPropagation();
        activeLayer = +el.getAttribute('data-layer');
        renderAll();
      });
    });
  }

  function renderAll(){
    renderEditor();
    renderSvg();
    if(activeTreeId) scheduleAutosave();
  }

  /* ============ PLAY MODE ============ */
  let playPath = [];
  let playFloor = 0; // minimum path length reachable via Back (1 when a single root was auto-entered)

  function findNodeById(id){
    for(const layer of state.layers){
      const found = layer.find(n=>n.id===id);
      if(found) return found;
    }
    return null;
  }

  function renderPlay(){
    const body = document.getElementById('playBody');
    const breadcrumb = document.getElementById('playBreadcrumb');
    const backBtn = document.getElementById('playBackBtn');
    body.innerHTML = '';

    if(!playPath.length){
      breadcrumb.textContent = state.title || 'Untitled Decision Tree';
      backBtn.disabled = true;

      const q = document.createElement('div');
      q.className = 'play-question';
      q.textContent = state.title || 'Untitled Decision Tree';
      body.appendChild(q);

      const roots = state.layers[0] || [];
      const choices = document.createElement('div');
      choices.className = 'play-choices';
      roots.forEach(n=>{
        const b = document.createElement('button');
        b.className = 'btn primary play-choice';
        b.textContent = n.label || 'Untitled';
        b.addEventListener('click', ()=>{ playPath = [n.id]; renderPlay(); });
        choices.appendChild(b);
      });
      body.appendChild(choices);
      return;
    }

    backBtn.disabled = playPath.length <= playFloor;
    breadcrumb.textContent = playPath.map(id => (findNodeById(id)?.label || 'Untitled')).join(' → ');

    const node = findNodeById(playPath[playPath.length - 1]);
    const q = document.createElement('div');
    q.className = 'play-question';
    q.textContent = node ? (node.label || 'Untitled') : 'This node no longer exists.';
    body.appendChild(q);

    const children = node ? node.children.map(cid => findNodeById(cid)).filter(Boolean) : [];
    if(children.length){
      const choices = document.createElement('div');
      choices.className = 'play-choices';
      children.forEach(c=>{
        const b = document.createElement('button');
        b.className = 'btn primary play-choice';
        b.textContent = c.label || 'Untitled';
        b.addEventListener('click', ()=>{ playPath.push(c.id); renderPlay(); });
        choices.appendChild(b);
      });
      body.appendChild(choices);
    } else {
      const end = document.createElement('div');
      end.className = 'play-end';
      end.textContent = 'End of path';
      body.appendChild(end);

      const restart = document.createElement('button');
      restart.className = 'btn';
      restart.textContent = '↺ Restart from top';
      restart.addEventListener('click', ()=>{
        const roots = state.layers[0] || [];
        playPath = playFloor === 1 && roots.length === 1 ? [roots[0].id] : [];
        renderPlay();
      });
      body.appendChild(restart);
    }
  }

  document.getElementById('playBtn').addEventListener('click', ()=>{
    const roots = state.layers[0] || [];
    // Skip the "pick a starting point" screen when there's only one root —
    // it's not a real choice, just an extra click.
    if(roots.length === 1){
      playPath = [roots[0].id];
      playFloor = 1;
    } else {
      playPath = [];
      playFloor = 0;
    }
    renderPlay();
    document.getElementById('playOverlay').classList.add('open');
  });
  document.getElementById('playCloseBtn').addEventListener('click', ()=>{
    document.getElementById('playOverlay').classList.remove('open');
  });
  document.getElementById('playBackBtn').addEventListener('click', ()=>{
    if(playPath.length > playFloor){ playPath.pop(); renderPlay(); }
  });

  /* ============ JSON EXPORT / IMPORT ============ */
  document.getElementById('jsonExportBtn').addEventListener('click', ()=>{
    const payload = { title: state.title, colors: state.colors, layers: state.layers, idCounter };
    const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const filename = (state.title || 'decision-tree').trim().replace(/[^a-z0-9\-_]+/gi,'-').toLowerCase() || 'decision-tree';
    a.href = url;
    a.download = filename + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  const jsonFileInput = document.getElementById('jsonFileInput');
  document.getElementById('jsonImportBtn').addEventListener('click', ()=> jsonFileInput.click());
  jsonFileInput.addEventListener('change', ()=>{
    const file = jsonFileInput.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ()=>{
      let parsed;
      try{ parsed = JSON.parse(reader.result); }
      catch(e){ alert('That file is not valid JSON.'); jsonFileInput.value = ''; return; }
      if(!parsed || !Array.isArray(parsed.layers)){
        alert('That file does not look like an Aline tree export (missing "layers").');
        jsonFileInput.value = '';
        return;
      }
      // Imports as a new saved tree rather than overwriting the current one in place.
      activeTreeId = newTreeId();
      state.title = parsed.title || 'Imported Decision Tree';
      state.colors = Object.assign({}, state.colors, parsed.colors || {});
      state.layers = parsed.layers;
      idCounter = parsed.idCounter != null ? parsed.idCounter : computeMaxIdCounter(parsed.layers);
      activeLayer = 0;
      titleInput.value = state.title;
      applyColors();
      initSettingsInputs();
      renderAll();
      persistActiveTree();
      renderTreesList();
      jsonFileInput.value = '';
    };
    reader.readAsText(file);
  });

  /* ============ EXPORT (standalone HTML) ============ */
  document.getElementById('exportBtn').addEventListener('click', ()=>{
    const {svgWidth, svgHeight, markup} = buildSvgMarkup();

    // resolve CSS variables into literal colors for a fully standalone file
    const c = state.colors;
    const resolvedMarkup = markup
      .replaceAll('var(--line-color)', c.lineColor)
      .replaceAll('var(--node-bg)', c.nodeBg)
      .replaceAll('var(--node-border)', c.nodeBorder)
      .replaceAll('var(--accent)', c.nodeBorder);

    const safeTitle = esc(state.title);
    const html = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>${safeTitle}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
  *{box-sizing:border-box;}
  body{margin:0;background:#111318;font-family:'Inter',sans-serif;color:${c.nodeText};}
  header{background:${c.titlebarBg};color:${c.titlebarText};padding:16px 22px;font-size:20px;font-weight:700;border-bottom:1px solid #333947;}
  .wrap{background:${c.canvasBg};padding:30px;overflow:auto;}
  .node-fo div{width:100%;height:100%;display:flex;align-items:center;justify-content:center;text-align:center;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;color:${c.nodeText};padding:4px 10px;line-height:1.25;}
  .node-idx{font-family:'JetBrains Mono',monospace;font-size:9px;fill:#8a8f9c;}
  .layer-tag{font-family:'JetBrains Mono',monospace;font-size:10px;fill:#8a8f9c;letter-spacing:1px;}
  footer{padding:10px 22px;font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#6b7280;background:${c.titlebarBg};border-top:1px solid #333947;}
</style>
</head>
<body>
  <header>${safeTitle}</header>
  <div class="wrap">
    <svg width="${svgWidth}" height="${svgHeight}" viewBox="0 0 ${svgWidth} ${svgHeight}" xmlns="http://www.w3.org/2000/svg">
      ${resolvedMarkup}
    </svg>
  </div>
  <footer>Exported decision tree · ${state.layers.length} row${state.layers.length!==1?'s':''} · static snapshot</footer>
</body>
</html>`;

    const blob = new Blob([html], {type:'text/html'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const filename = (state.title || 'decision-tree').trim().replace(/[^a-z0-9\-_]+/gi,'-').toLowerCase() || 'decision-tree';
    a.href = url;
    a.download = filename + '.html';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  /* ============ INIT ============ */
  (function initApp(){
    const savedActiveId = localStorage.getItem(STORAGE_ACTIVE_KEY);
    const map = loadTreesMap();
    if(savedActiveId && map[savedActiveId]){
      loadTree(savedActiveId);
      return;
    }
    const ids = Object.keys(map);
    if(ids.length){
      ids.sort((a, b) => map[b].updatedAt - map[a].updatedAt);
      loadTree(ids[0]);
      return;
    }
    createNewTree(true); // first-ever run: seed with the example tree
  })();

})();
</script>
</body>
</html>
